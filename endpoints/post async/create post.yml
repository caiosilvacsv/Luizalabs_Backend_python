info:
  name: create post
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/posts/"
  body:
    type: json
    data: |-
      {
       "title": "Teste numero ",
        "content": "Contem um texto maravilhosamente incrivel!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
