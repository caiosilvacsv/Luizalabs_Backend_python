info:
  name: read all
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/posts/?published=off&limit=10"
  headers:
    - name: Authorization
      value: ""
      disabled: true
  params:
    - name: published
      value: off
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
