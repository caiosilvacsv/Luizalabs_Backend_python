info:
  name: read all
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8000/posts?published=on&limit=10
  params:
    - name: published
      value: on
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
