info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/auth/login"
  body:
    type: json
    data: |-
      {
        "user_id":1
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Pega o corpo da resposta em formato JSON
        const data = res.getBody();

        // Verifica se o token existe na resposta
        if (data && data.access_token) {
          // Salva o token em uma variável chamada "jwt_token"
          bru.setVar("jwt_token", data.access_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
